<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GenoAtlas</title>
    
    <style>
      body {
        margin: 0;
        background-color: #e0f2fe; /* Cor do céu claro */
        overflow: hidden;
      }
      #root {
        height: 100dvh;
        width: 100vw;
      }
      /* A Mágica do App Shell */
      .instant-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to bottom, #bae6fd, #f0f9ff); /* Gradiente idêntico ao do jogo */
        z-index: 99999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-globe {
        width: 70px;
        height: 70px;
        background-color: #22c55e; /* Verde Explorador */
        border-radius: 50%;
        box-shadow: inset -10px -10px 20px rgba(0,0,0,0.15), 0 10px 20px rgba(34, 197, 94, 0.3);
        animation: pulse 1.5s infinite ease-in-out;
        margin-bottom: 24px;
      }
      .loader-text {
        color: #15803d; /* Verde escuro */
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-style: italic;
        animation: blink 1.5s infinite both;
      }
      @keyframes pulse {
        0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(34, 197, 94, 0); }
        100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="instant-loader">
        <div class="loader-globe"></div>
        <div class="loader-text">GenoAtlas</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
